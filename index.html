
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АРХИВ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,800;1,400;1,800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #020205;
            color: white;
            overflow: hidden;
            user-select: none;
        }
        .screen-container {
            display: flex;
            width: 300vw;
            height: 100vh;
            transition: transform 1000s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .visual-bar {
            width: 8px;
            background-color: #00ff9d;
            transition: height 0.15s ease;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div class="fixed inset-0 bg-[radial-gradient(circle_at_50%_50%,#0a0a25_0%,#020205_100%)] z-0"></div>

    <div id="main-track" class="screen-container" style="transition-duration: 1000ms;">
        <section class="w-[100vw] h-full flex items-center justify-center relative p-8">
            <button onclick="setScreen(1)" class="absolute right-12 top-1/2 -translate-y-1/2 text-[#00ff9d] hover:scale-125 transition-all z-50">
                <i data-lucide="chevron-right" style="width: 64px; height: 64px;"></i>
            </button>
            
            <div class="w-full max-w-5xl bg-white/5 backdrop-blur-3xl border border-white/10 rounded-[4rem] p-16 text-center relative overflow-hidden">
                <div id="visualizer" class="absolute bottom-0 left-0 right-0 h-32 flex items-end justify-center gap-1 opacity-20 pointer-events-none"></div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-8 mb-12 relative z-10">
                    <div class="flex flex-col items-center">
                        <div id="days" class="text-7xl md:text-9xl font-black tracking-tighter bg-gradient-to-b from-white to-white/10 bg-clip-text text-transparent">00</div>
                        <div class="text-lg font-bold text-[#00ff9d] mt-2 tracking-widest uppercase opacity-60">Дней</div>
                    </div>
                    <div class="flex flex-col items-center">
                        <div id="hours" class="text-7xl md:text-9xl font-black tracking-tighter bg-gradient-to-b from-white to-white/10 bg-clip-text text-transparent">00</div>
                        <div class="text-lg font-bold text-[#00ff9d] mt-2 tracking-widest uppercase opacity-60">Часов</div>
                    </div>
                    <div class="flex flex-col items-center">
                        <div id="minutes" class="text-7xl md:text-9xl font-black tracking-tighter bg-gradient-to-b from-white to-white/10 bg-clip-text text-transparent">00</div>
                        <div class="text-lg font-bold text-[#00ff9d] mt-2 tracking-widest uppercase opacity-60">Минут</div>
                    </div>
                    <div class="flex flex-col items-center">
                        <div id="seconds" class="text-7xl md:text-9xl font-black tracking-tighter bg-gradient-to-b from-white to-white/10 bg-clip-text text-transparent">00</div>
                        <div class="text-lg font-bold text-[#00ff9d] mt-2 tracking-widest uppercase opacity-60">Секунд</div>
                    </div>
                </div>

                <div class="flex flex-col items-center gap-6 relative z-10">
                    <div class="inline-flex items-center gap-4 bg-white/5 border border-white/10 px-6 py-3 rounded-full backdrop-blur-xl">
                        <label class="cursor-pointer border border-[#00ff9d] text-[#00ff9d] px-6 py-2 rounded-full text-[10px] font-black hover:bg-[#00ff9d] hover:text-black transition-all uppercase tracking-widest">
                            ВЫБРАТЬ ФАЙЛ 
                            <input type="file" id="audio-input" class="hidden" accept="audio/*">
                        </label>
                        <button id="play-btn" class="p-3 rounded-full bg-white text-black transition-all">
                            <i data-lucide="play" id="play-icon"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section class="w-[100vw] h-full flex flex-col items-center justify-center relative p-8">
            <button onclick="setScreen(0)" class="absolute left-12 top-1/2 -translate-y-1/2 text-[#00ff9d] hover:scale-125 transition-all z-50">
                <i data-lucide="chevron-left" style="width: 64px; height: 64px;"></i>
            </button>
            <button onclick="setScreen(2)" class="absolute right-12 top-1/2 -translate-y-1/2 text-[#00ff9d] hover:scale-125 transition-all z-50">
                <i data-lucide="chevron-right" style="width: 64px; height: 64px;"></i>
            </button>
            
            <div class="w-full max-w-2xl bg-white/5 backdrop-blur-3xl border border-white/10 rounded-[3rem] p-10 flex flex-col items-center">
                <h2 class="text-4xl font-black tracking-[0.5em] mb-10 text-center uppercase italic text-white/90">АРХИВ_01</h2>
                <div onclick="openModal(0)" class="group relative w-full aspect-square rounded-[2rem] overflow-hidden cursor-pointer border border-white/10 hover:border-[#00ff9d] transition-all duration-500 shadow-2xl">
                    <img src="https://i.ibb.co/y1JpqcV/image.jpg" class="w-full h-full object-cover opacity-60 group-hover:opacity-100 group-hover:scale-110 transition-all duration-1000">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent flex items-end p-8">
                        <div>
                            <div class="text-[10px] text-[#00ff9d] tracking-widest font-bold mb-2 uppercase">ALBUM_DATA</div>
                            <div class="text-2xl font-black uppercase tracking-tighter leading-none">ОТГОЛОСКИ: ИСТОРИЯ</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="w-[100vw] h-full flex flex-col items-center justify-center relative p-8">
            <button onclick="setScreen(1)" class="absolute left-12 top-1/2 -translate-y-1/2 text-[#00ff9d] hover:scale-125 transition-all z-50">
                <i data-lucide="chevron-left" style="width: 64px; height: 64px;"></i>
            </button>
            
            <div class="w-full max-w-2xl bg-white/5 backdrop-blur-3xl border border-white/10 rounded-[3rem] p-10 flex flex-col items-center">
                <h2 class="text-4xl font-black tracking-[0.5em] mb-10 text-center uppercase italic text-white/90">АРХИВ_02</h2>
                <div onclick="openModal(1)" class="group relative w-full aspect-square rounded-[2rem] overflow-hidden cursor-pointer border border-white/10 hover:border-red-500 transition-all duration-500 shadow-2xl">
                    <img src="https://i.ibb.co/9mp7bWdH/image.jpg" class="w-full h-full object-cover opacity-60 group-hover:opacity-100 group-hover:scale-110 transition-all duration-1000">
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent flex items-end p-8">
                        <div class="w-full flex justify-between items-end">
                            <div>
                                <div class="text-[10px] text-red-500 tracking-widest font-bold mb-2 uppercase">SINGLE_DATA</div>
                                <div class="text-2xl font-black uppercase tracking-tighter leading-none">КРАСНОЕ СЕРДЦЕ</div>
                            </div>
                            <i data-lucide="heart" class="text-red-500 mb-1 fill-current" style="width: 32px; height: 32px;"></i>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <div id="modal" class="fixed inset-0 z-[200] hidden items-center justify-center backdrop-blur-3xl bg-black/95 transition-all">
        <div class="w-full h-full max-w-4xl bg-[#08080c] border-white/10 md:rounded-[3rem] overflow-hidden flex flex-col relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-8 right-8 z-[210] p-3 bg-white/5 rounded-full hover:bg-red-500 transition-all">
                <i data-lucide="x"></i>
            </button>
            
            <div class="flex-1 overflow-y-auto scrollbar-hide">
                <div class="relative h-[50vh] w-full overflow-hidden">
                    <img id="modal-img" src="" class="w-full h-full object-cover scale-105">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#08080c] via-transparent to-transparent"></div>
                    <div class="absolute bottom-12 left-12 right-12">
                        <div id="modal-badge" class="flex items-center gap-3 mb-4">
                            <i data-lucide="shield-check" style="width: 20px; height: 20px;"></i>
                            <span class="text-xs tracking-[0.4em] font-black uppercase">DATA_DECRYPTED</span>
                        </div>
                        <h1 id="modal-title" class="text-5xl md:text-7xl font-black text-white italic tracking-tighter uppercase leading-tight"></h1>
                    </div>
                </div>
                
                <div class="px-12 pb-32">
                    <div class="bg-white/5 border border-white/10 p-10 rounded-3xl mb-16 mt-8 relative group">
                        <p id="modal-story" class="text-xl md:text-2xl text-white/80 leading-relaxed font-sans lowercase italic"></p>
                        <div id="modal-extra-container" class="mt-8 text-center hidden">
                            <span id="modal-extra" class="text-white/[0.03] font-sans italic text-sm transition-opacity duration-1000 group-hover:text-white/20"></span>
                        </div>
                    </div>
                    <div class="text-center opacity-20 text-[10px] tracking-[0.5em] uppercase">
                        Архив защищен протоколом end-to-end
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DATA_ARCHIVE = [
            { 
                id: 'otgoloski_main', 
                type: 'ALBUM',
                title: 'АЛЬБОМ "ОТГОЛОСКИ"', 
                img: 'https://i.ibb.co/y1JpqcV/image.jpg', 
                story: 'альбом "отголоски" должен был выйти 20 марта этого года но альбом не вышел в свет из за малого времени на его визуализацию альбом хотели перенести но вовсе решились не выложить альбом и сделать новый...',
                extra: null
            },
            {
                id: 'red_heart_track',
                type: 'SINGLE',
                title: 'ТРЕК "КРАСНОЕ СЕРДЦЕ"',
                img: 'https://i.ibb.co/9mp7bWdH/image.jpg',
                story: 'трек красное сердце был запланирован на 22 апреля но не вышел так как трек не успели свести трек планировали так же перенести как и альбом отголоски но отказались',
                extra: 'может быть он выйдет'
            }
        ];

        let currentScreen = 0;
        let isPlaying = false;
        const audio = new Audio();
        const visualizer = document.getElementById('visualizer');
        const barsCount = 12;

        for (let i = 0; i < barsCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'visual-bar';
            bar.style.height = '10%';
            visualizer.appendChild(bar);
        }

        function setScreen(index) {
            currentScreen = index;
            document.getElementById('main-track').style.transform = `translateX(-${index * 100}vw)`;
        }

        function updateTimer() {
            const now = new Date();
            let target = new Date(now.getFullYear(), 5, 1);
            if (now > target) target.setFullYear(now.getFullYear() + 1);
            const diff = target - now;
            
            const d = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
            const m = Math.floor((diff / (1000 * 60)) % 60).toString().padStart(2, '0');
            const s = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');

            document.getElementById('days').innerText = d;
            document.getElementById('hours').innerText = h;
            document.getElementById('minutes').innerText = m;
            document.getElementById('seconds').innerText = s;
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        setInterval(() => {
            const bars = document.querySelectorAll('.visual-bar');
            bars.forEach(bar => {
                const h = isPlaying ? Math.random() * 60 + 20 : 10;
                bar.style.height = `${h}%`;
            });
        }, 150);

        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const audioInput = document.getElementById('audio-input');

        playBtn.onclick = () => {
            if (!audio.src) return;
            if (isPlaying) {
                audio.pause();
                playBtn.className = "p-3 rounded-full bg-white text-black transition-all";
                playIcon.setAttribute('data-lucide', 'play');
            } else {
                audio.play();
                playBtn.className = "p-3 rounded-full bg-[#00ff9d] text-black transition-all";
                playIcon.setAttribute('data-lucide', 'pause');
            }
            isPlaying = !isPlaying;
            lucide.createIcons();
        };

        audioInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                audio.src = URL.createObjectURL(file);
                isPlaying = false;
                playBtn.className = "p-3 rounded-full bg-white text-black transition-all";
                playIcon.setAttribute('data-lucide', 'play');
                lucide.createIcons();
            }
        };

        function openModal(index) {
            const item = DATA_ARCHIVE[index];
            const modal = document.getElementById('modal');
            document.getElementById('modal-img').src = item.img;
            document.getElementById('modal-title').innerText = item.title;
            document.getElementById('modal-story').innerText = item.story;
            
            const badge = document.getElementById('modal-badge');
            badge.className = `flex items-center gap-3 mb-4 ${item.type === 'SINGLE' ? 'text-red-500' : 'text-[#00ff9d]'}`;
            
            const extra = document.getElementById('modal-extra');
            const extraCont = document.getElementById('modal-extra-container');
            if (item.extra) {
                extra.innerText = item.extra;
                extraCont.classList.remove('hidden');
            } else {
                extraCont.classList.add('hidden');
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        lucide.createIcons();
    </script>
</body>
</html>
